services:
  postgres:
    image: postgres:16-alpine
    container_name: easy-listings-db
    restart: unless-stopped
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: easylisting
      POSTGRES_PASSWORD: easylisting
      POSTGRES_DB: easy_listings
    volumes:
      - pgdata:/var/lib/postgresql/data

volumes:
  pgdata:
